services:
  mailsort:
    build: .
    container_name: mailsort
    restart: unless-stopped
    stop_grace_period: 180s
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    ports:
      - "8080:8080"
    environment:
      - FASTMAIL_API_TOKEN=${FASTMAIL_API_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TZ=America/Chicago
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
