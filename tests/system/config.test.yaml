# System test config — uses a dedicated Fastmail test account.
# Copy this to the project root and set FASTMAIL_API_TOKEN env var
# to the test account's API token.

fastmail:
  api_url: "https://api.fastmail.com/jmap/api/"
  session_url: "https://api.fastmail.com/jmap/session"

scheduler:
  interval_minutes: 15
  min_age_minutes: 1            # 1 minute — allows testing too_new gate quickly
  max_batch_size: 250

classification:
  thresholds:
    rule_move: 0.85
    llm_move: 0.80
    llm_move_known_contact: 0.93
  correction_penalty: 0.05
  coherence_lookback_days: 30
  coherence_min_sample: 3
  staleness_threshold_days: 365
  staleness_decay_days: 365
  staleness_floor: 0.6
  deactivation_threshold: 0.50
  base_confidence:
    list_id: 0.95
    exact_sender_floor: 0.80
    exact_sender_cap: 0.95
    exact_sender_per_evidence: 0.03
    sender_domain_floor: 0.75
    sender_domain_cap: 0.90
    sender_domain_per_evidence: 0.02

folder_description_overrides:
  "Affairs": "Parent folder only — do NOT sort emails here. Use subfolders Affairs/Banks or Affairs/Stores instead."
  "Affairs/Banks": "Bank statements, fraud alerts, and financial notifications"
  "Affairs/Stores": "Order confirmations, shipping updates, and return receipts"
  "People": "Parent folder only — do NOT sort emails here. Use subfolders like People/Children instead."
  "People/Children": "School notices, activity signups, and pediatrician communications"
  "Affairs/Medical": "Medical appointment reminders, lab results, and health notifications"

known_contact_overrides:
  "testcontact@example.com":
    relationship: "friend"

exclude_folder_patterns:
  - "INBOX/Affairs"
  - "INBOX/People"
skip_senders: []

# Runtime — test database separate from production
db_path: "data/test.db"

# Logging
logging_config:
  level: DEBUG
  file: "data/test.log"
  max_size_mb: 10
  backup_count: 3